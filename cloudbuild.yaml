# Cloud Build pipeline cho siupo-ai-service -> Cloud Run
# Trigger: chạy mỗi khi push lên branch đã cấu hình (xem DEPLOY-GCP.md).
#
# Tự động: build Docker image -> push lên Artifact Registry -> deploy Cloud Run.

substitutions:
  _SERVICE: siupo-ai-service
  _REGION: us-central1            # đặt trùng GOOGLE_REGION / Vertex AI region
  _REPO: siupo                    # tên Artifact Registry repo (tạo 1 lần)
  # Tag image. Build thủ công: mặc định "latest". Trigger từ git có thể override:
  #   --substitutions=_TAG=$SHORT_SHA  (hoặc đặt trong cấu hình trigger)
  _TAG: latest

steps:
  # 1. Build image
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # 2. Push image (cả 2 tag)
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # 3. Deploy lên Cloud Run
  #    KHÔNG set GOOGLE_APPLICATION_CREDENTIALS -> code dùng ADC (service account
  #    của Cloud Run). Nhớ cấp role "Vertex AI User" cho service account đó.
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=ai-service@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --min-instances=1          # tránh cold start (trừ vào credit)
      - --max-instances=3
      - --timeout=300
      - --set-env-vars=GOOGLE_PROJECT_ID=$PROJECT_ID,GOOGLE_REGION=${_REGION},CONSOLIDATE_INTERVAL_HOURS=24
      # Các giá trị nhạy cảm lấy từ Secret Manager (tạo trước, xem DEPLOY-GCP.md)
      - --set-secrets=QDRANT_URL=QDRANT_URL:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,SERPAPI_KEY=SERPAPI_KEY:latest,BE_BASE_URL=BE_BASE_URL:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_PASSWORD=ADMIN_PASSWORD:latest,TURSO_AUTH_TOKEN=TURSO_AUTH_TOKEN:latest,TURSO_DATABASE_URL=TURSO_DATABASE_URL:latest,ZALO_BOT_TOKEN=ZALO_BOT_TOKEN:latest,ZALO_WEBHOOK_SECRET=ZALO_WEBHOOK_SECRET:latest,GMAIL_SENDER_EMAIL=GMAIL_SENDER_EMAIL:latest,GMAIL_APP_PASSWORD=GMAIL_APP_PASSWORD:latest,GMAIL_ADMIN_EMAIL=GMAIL_ADMIN_EMAIL:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
